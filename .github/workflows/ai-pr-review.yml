
name: ai-pr-review-and-tests
on:
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      checks: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests
      - name: AI PR Review (annotate & gate)
        env:
          FUNC_URL: ${{ secrets.AI_PR_REVIEW_FUNC_URL }}
          FUNC_KEY: ${{ secrets.AI_PR_REVIEW_FUNC_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python .github/scripts/call_pr_review.py             --repo "${{ github.repository }}"             --pr "${{ github.event.pull_request.number }}"             --func-url "$FUNC_URL"             --func-key "$FUNC_KEY"             --github-token "$GITHUB_TOKEN"             --head-sha "${{ github.event.pull_request.head.sha }}"
