
name: chatops-ai
on:
  issue_comment:
    types: [created]
jobs:
  handle:
    if: contains(github.event.comment.body, '/ai ')
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Route ChatOps
        env:
          FUNC_URL: ${{ secrets.AI_CHATOPS_FUNC_URL }}
          FUNC_KEY: ${{ secrets.AI_CHATOPS_FUNC_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: echo "Route to functions based on command..."
