
name: chatops-ai
on:
  issue_comment:
    types: [created]
jobs:
  handle:
    if: contains(github.event.comment.body, '/ai ')
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Route ChatOps command
        env:
          FUNC_URL: ${{ secrets.AI_CHATOPS_FUNC_URL }}
          FUNC_KEY: ${{ secrets.AI_CHATOPS_FUNC_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
        run: |
          python .github/scripts/chatops_router.py \
            --repo "$REPO" \
            --issue "$ISSUE_NUMBER" \
            --comment "$COMMENT_BODY" \
            --github-token "$GITHUB_TOKEN" \
            --func-url "$FUNC_URL" \
            --func-key "$FUNC_KEY"
